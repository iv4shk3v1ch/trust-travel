<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgb(59,130,246);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgb(147,51,234);stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background gradient -->
  <rect width="800" height="600" fill="url(#grad1)" />
  
  <!-- Icon group centered -->
  <g transform="translate(400, 300)">
    <!-- Image icon -->
    <rect x="-80" y="-60" width="160" height="120" rx="8" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.6)" stroke-width="3"/>
    
    <!-- Mountain shape -->
    <path d="M -60,-20 L -30,-50 L 0,-20 L 30,-40 L 60,-10 L 60,40 L -60,40 Z" fill="rgba(255,255,255,0.4)"/>
    
    <!-- Sun/circle -->
    <circle cx="-35" cy="-30" r="12" fill="rgba(255,255,255,0.5)"/>
  </g>
  
  <!-- Text -->
  <text x="400" y="420" font-family="Arial, sans-serif" font-size="24" fill="rgba(255,255,255,0.9)" text-anchor="middle" font-weight="600">
    No Image Available
  </text>
</svg>
